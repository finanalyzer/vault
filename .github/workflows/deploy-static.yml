name: Deploy Static to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued. However, do NOT cancel in-progress runs
# as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Create .env file
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env
          echo "VITE_APP_TITLE=${{ secrets.VITE_APP_TITLE }}" >> .env
          echo "VITE_APP_HOST=${{ secrets.VITE_APP_HOST }}" >> .env
          echo "VITE_DEMO_MODE=${{ secrets.VITE_DEMO_MODE }}" >> .env
          echo "VITE_APP_BASE=/vault/" >> .env
          echo "=== .env file contents ==="
          cat .env
          echo "=========================="

      - name: Build static assets
        run: pnpm run build:static
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_TITLE: ${{ secrets.VITE_APP_TITLE }}
          VITE_APP_HOST: ${{ secrets.VITE_APP_HOST }}
          VITE_DEMO_MODE: ${{ secrets.VITE_DEMO_MODE }}
          VITE_APP_BASE: "/vault/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-static
          publish_branch: gh-pages
          force_orphan: true
